name: Scheduled Regression Tests in UI report output

permissions:
  checks: write
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  run-pester:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Run Pester tests and generate detailed output
        shell: pwsh
        id: pester-tests
        run: |
          Install-Module -Name Pester -Force -SkipPublisherCheck -Scope CurrentUser
          
          New-Item -ItemType Directory -Path ./TestResults -Force
          
          # Run tests once, capturing both the detailed results object and the NUnit XML report
          $config = New-PesterConfiguration
          $config.Run.Path = './health.Tests.ps1'
          $config.Run.PassThru = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = 'NUnitXml'
          $config.TestResult.OutputPath = './TestResults/test-results.xml'
          $results = Invoke-Pester -Configuration $config
          
          # ===== GENERATE DETAILED UI OUTPUT =====
          $detailedOutput = "# 📊 Pester Test Results - Detailed Report`n`n"
          $detailedOutput += "**Generated:** $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC')`n`n"
          $detailedOutput += "---`n`n"
          $detailedOutput += "## 📈 Summary`n`n"
          $detailedOutput += "| Metric | Value |`n"
          $detailedOutput += "|--------|-------|`n"
          $detailedOutput += "| Total Tests | $($results.TotalCount) |`n"
          $detailedOutput += "| ✅ Passed | $($results.PassedCount) |`n"
          $detailedOutput += "| ❌ Failed | $($results.FailedCount) |`n"
          $detailedOutput += "| ⏭️ Skipped | $($results.SkippedCount) |`n"
          $detailedOutput += "| ⏱️ Duration | $($results.Duration) |`n`n"
          $detailedOutput += "---`n`n"
          $detailedOutput += "## 📝 Detailed Test Results`n`n"
          
          # Process each test and format it nicely
          $testGroups = $results.Tests | Group-Object { $_.Block } -AsHashTable
          
          foreach ($blockName in $testGroups.Keys | Sort-Object) {
            $tests = $testGroups[$blockName]
            
            $failedCount = ($tests | Where-Object { $_.Result -ne 'Passed' }).Count
            $totalCount = $tests.Count
            $statusIcon = if ($failedCount -eq 0) { '✅' } else { '❌' }
            
            $detailedOutput += "`n### $statusIcon Context $blockName`n`n"
            
            foreach ($test in $tests) {
              $testName = $test.Name
              $result = $test.Result
              $duration = $test.Duration
              $icon = if ($result -eq 'Passed') { '[+]' } else { '[-]' }
              
              # Format duration
              $durationStr = if ($duration.TotalMilliseconds -gt 1000) {
                "{0:F2}s" -f $duration.TotalSeconds
              } else {
                "{0}ms" -f $duration.TotalMilliseconds
              }
              
              $detailedOutput += "- $icon **$testName** "
              
              if ($result -eq 'Passed') {
                $detailedOutput += "✅ $durationStr`n"
              } else {
                $detailedOutput += "❌ FAILED`n"
                if ($test.ErrorRecord) {
                  $errorMsg = $test.ErrorRecord.Exception.Message -replace "`n", "`n  "
                  $detailedOutput += "  - Error: $errorMsg`n"
                }
                if ($test.Stacktrace) {
                  $detailedOutput += "  - Stack: $($test.Stacktrace)`n"
                }
              }
            }
            
            # Add summary for this context
            $detailedOutput += "`n_Context Summary: $($tests.Count) tests, $($failedCount) failed_`n"
          }
          
          # ===== ADD FAILED TESTS DETAILS SECTION =====
          $backtick = "``"
          $fence = $backtick + $backtick + $backtick
          $failedTests = $results.Failed
          if ($failedTests.Count -gt 0) {
            $detailedOutput += "`n---`n"
            $detailedOutput += "## ❌ Failed Tests Details`n`n"

            foreach ($test in $failedTests) {
              $detailedOutput += "### $($test.Name)`n"
              $detailedOutput += "- **Context:** $($test.Block)`n"
              $detailedOutput += "- **Error:** $($test.ErrorRecord.Exception.Message)`n"
              $detailedOutput += "- **Line:** $($test.ScriptBlock.StartPosition.Line)`n`n"
              $detailedOutput += "$fence" + "powershell`n"
              $detailedOutput += "$($test.ScriptBlock.ToString())`n"
              $detailedOutput += "$fence`n`n"
            }
          } else {
            $detailedOutput += "`n---`n"
            $detailedOutput += "## ✅ All tests passed successfully! 🎉`n"
          }

          # Save the detailed report to file
          $detailedOutput | Out-File -FilePath ./TestResults/detailed-report.md -Encoding UTF8

          # ===== CREATE CONSOLE OUTPUT VERSION =====
          $consoleOutput = "╔══════════════════════════════════════════════════════════════════╗`n"
          $consoleOutput += "║ 📊 PESTER TEST RESULTS ║`n"
          $consoleOutput += "╚══════════════════════════════════════════════════════════════════╝`n`n"

          foreach ($blockName in $testGroups.Keys | Sort-Object) {
            $tests = $testGroups[$blockName]
            $consoleOutput += "┌─ $blockName`n"

            foreach ($test in $tests) {
              $result = $test.Result
              $icon = if ($result -eq 'Passed') { '✓' } else { '✗' }
              $colorLabel = if ($result -eq 'Passed') { 'PASSED' } else { 'FAILED' }
              $duration = $test.Duration
              $durationStr = if ($duration.TotalMilliseconds -gt 1000) {
                "{0:F2}s" -f $duration.TotalSeconds
              } else {
                "{0}ms" -f $duration.TotalMilliseconds
              }

              $consoleOutput += "  $icon $($test.Name) - $colorLabel ($durationStr)`n"

              if ($result -ne 'Passed') {
                $consoleOutput += "    Error: $($test.ErrorRecord.Exception.Message)`n"
              }
            }
            $consoleOutput += "`n"
          }

          # Add failed tests summary to console output
          $failedTests = $results.Failed
          if ($failedTests.Count -gt 0) {
            $consoleOutput += "`n" + "=" * 60 + "`n"
            $consoleOutput += "❌ FAILED TESTS SUMMARY`n"
            $consoleOutput += "=" * 60 + "`n"
            foreach ($test in $failedTests) {
              $consoleOutput += "• $($test.Name)`n"
              $consoleOutput += "  Error: $($test.ErrorRecord.Exception.Message)`n"
              $consoleOutput += "  Line: $($test.ScriptBlock.StartPosition.Line)`n`n"
            }
          } else {
            $consoleOutput += "`n" + "=" * 60 + "`n"
            $consoleOutput += "✅ ALL TESTS PASSED! 🎉`n"
            $consoleOutput += "=" * 60 + "`n"
          }

          $consoleOutput | Out-File -FilePath ./TestResults/console-output.txt -Encoding UTF8

          # ===== SET OUTPUTS FOR WORKFLOW =====
          if ($results.FailedCount -eq 0) {
            echo "tests_passed=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "tests_passed=false" >> $env:GITHUB_OUTPUT
          }
          echo "test_count=$($results.TotalCount)" >> $env:GITHUB_OUTPUT
          echo "failed_count=$($results.FailedCount)" >> $env:GITHUB_OUTPUT
          echo "passed_count=$($results.PassedCount)" >> $env:GITHUB_OUTPUT

          # ===== DISPLAY RUN COMPLETION TIME =====
          Write-Host "`n✅ Test execution completed at: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Green
          Write-Host "📊 Total Tests: $($results.TotalCount)" -ForegroundColor Cyan
          Write-Host "✅ Passed: $($results.PassedCount)" -ForegroundColor Green
          Write-Host "❌ Failed: $($results.FailedCount)" -ForegroundColor Red
          Write-Host "⏱️ Duration: $($results.Duration)`n" -ForegroundColor Yellow
        continue-on-error: true

      # ===== DISPLAY DETAILED RESULTS IN UI =====
      - name: 📊 Display Detailed Test Results in UI
        if: always()
        shell: pwsh
        run: |
          if (Test-Path ./TestResults/detailed-report.md) {
            Get-Content ./TestResults/detailed-report.md >> $env:GITHUB_STEP_SUMMARY
          }

          if (Test-Path ./TestResults/console-output.txt) {
            "`n## 🖥️ Console Output`n" >> $env:GITHUB_STEP_SUMMARY
            '```' >> $env:GITHUB_STEP_SUMMARY
            Get-Content ./TestResults/console-output.txt >> $env:GITHUB_STEP_SUMMARY
            '```' >> $env:GITHUB_STEP_SUMMARY
          }

      # ===== DISPLAY COLOR-CODED CONSOLE OUTPUT =====
      - name: 📋 Display Color-Coded Console Output
        if: always()
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "╔══════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║ 📊 PESTER TEST RESULTS ║" -ForegroundColor Cyan
          Write-Host "╚══════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""

          if (Test-Path ./TestResults/console-output.txt) {
            $lines = Get-Content ./TestResults/console-output.txt
            foreach ($line in $lines) {
              if ($line -match "FAILED") {
                Write-Host $line -ForegroundColor Red
              } elseif ($line -match "PASSED") {
                Write-Host $line -ForegroundColor Green
              } elseif ($line -match "Error:") {
                Write-Host $line -ForegroundColor Yellow
              } elseif ($line -match "┌─") {
                Write-Host $line -ForegroundColor Magenta
              } elseif ($line -match "✓") {
                Write-Host $line -ForegroundColor Green
              } elseif ($line -match "✗") {
                Write-Host $line -ForegroundColor Red
              } else {
                Write-Host $line
              }
            }
          }

      # ===== UPLOAD TEST ARTIFACTS =====
      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_id }}
          path: |
            ./TestResults/
          retention-days: 30

      # ===== PUBLISH TEST REPORT AS CHECK RUN =====
      - name: Publish Test Report (Check Run)
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            ./TestResults/test-results.xml
          check_name: Pester Test Results
          comment_mode: always
          report_individual_runs: true
          check_run_annotations: all tests

      # ===== FAIL WORKFLOW IF TESTS FAILED =====
      - name: Fail workflow if tests failed
        if: steps.pester-tests.outputs.tests_passed == 'false' || steps.pester-tests.outcome == 'failure'
        run: exit 1
