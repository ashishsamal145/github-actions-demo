name: "Docker Build and Push to ghcr  with cleanup"

on:
  workflow_dispatch:


jobs:
  build-and-scan:
    name: Build and Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: write  # Required for pushing to GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long  # Unique SHA tag - NEVER overwritten
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}},enable={{is_default_branch}}  # Timestamp tag
            type=raw,value=run-${{ github.run_number }},enable={{is_default_branch}}  # Run number tag

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.69.3
          trivy -v

      - name: Run Trivy scanner on the pushed image (Table format)
        run: |
          trivy image --severity CRITICAL,HIGH ghcr.io/${{ github.repository }}:latest

      - name: Generate SARIF report
        run: |
          trivy image --format sarif --output trivy-results.sarif ghcr.io/${{ github.repository }}:latest
        continue-on-error: true  # Continue even if vulnerabilities found

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-scan'

      - name: Upload scan report as a workflow artifact
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          name: trivy-scan-report
          path: trivy-results.sarif

  cleanup:
    name: Cleanup Old Images
    runs-on: ubuntu-latest
    needs: build-and-scan  # Wait for build to complete
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'  # Only run on main/master
    permissions:
      packages: write  # Required to delete packages
    
    steps:
      - name: Install GitHub CLI
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y

      - name: Authenticate with GitHub CLI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Delete old package versions (keep versions with "purvankara" tag)
        run: |
          echo "Fetching versions and deleting old ones..."

          gh api /users/ashishsamal145/packages/container/github-actions-demo/versions \
            --jq 'map(select(.metadata.container.tags | map(select(. == "purvankara" or . == "books")) | length == 0)) | .[1:] | .[].id' \
            | xargs -r -P 8 -I{} gh api --method DELETE "/users/ashishsamal145/packages/container/github-actions-demo/versions/{}" \
            || echo "No versions to delete or error occurred"
            
