name: Scheduled Regression Tests

permissions:
  checks: write
  contents: read
  
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  schedule:
    - cron: '40 10 * * *'
  workflow_dispatch:

jobs:
  run-pester:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Run Pester tests with detailed results
        shell: pwsh
        id: pester-tests
        run: |
          Install-Module -Name Pester -Force -SkipPublisherCheck -Scope CurrentUser
          
          # Create results directory
          New-Item -ItemType Directory -Path ./TestResults -Force
          
          # Configure Pester
          $config = New-PesterConfiguration
          $config.Run.Path = './health.Tests.ps1'
          $config.Output.Verbosity = 'Detailed'
          
          # Enable test result export
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = 'NUnitXml'
          $config.TestResult.OutputPath = './TestResults/test-results.xml'
          
          # Run tests - CORRECTED: Use -Configuration only, no -PassThru
          $results = Invoke-Pester -Configuration $config
          
          # Get test results from the configuration
          $totalTests = $config.Run.PassThru | ForEach-Object { $_.TotalCount }
          
          # Alternative way to get results
          if (Test-Path './TestResults/test-results.xml') {
            Write-Host "Test results generated successfully"
          }
          
          Get-Date -Format "yyyy-MM-dd HH:mm:ss"
        continue-on-error: true

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_id }}
          path: |
            ./TestResults/
          retention-days: 30

      - name: Publish Test Results to Summary
        if: always()
        shell: pwsh
        run: |
          if (Test-Path ./TestResults/test-results.xml) {
            Write-Host "Test results available"
            Write-Host "## Test Results" >> $env:GITHUB_STEP_SUMMARY
            Write-Host "Test results have been generated and uploaded as artifacts." >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Publish NUnit Test Report
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            ./TestResults/test-results.xml
          check_name: Pester Test Results
          comment_mode: off
          report_individual_runs: true
