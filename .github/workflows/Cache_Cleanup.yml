  # ── 5. Clean up old GitHub Actions caches ──────────────────────────────────
  cleanup-artifacts:
    runs-on: ubuntu-latest
    needs: [cleanup]  # No dependencies - run independently
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request'
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete old caches (keep latest per ref)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "🧹 Cleaning up old caches (keeping latest per ref)"
          echo "📁 Repository: $REPO"
          echo "📌 Event: ${{ github.event_name }}"
          echo ""
          
          # Get ALL refs with caches
          REFS=$(gh api --paginate "/repos/$REPO/actions/caches" \
            --jq '.actions_caches[].ref' | sort -u)
          
          if [ -z "$REFS" ]; then
            echo "✅ No caches found"
            exit 0
          fi
          
          echo "📁 Found refs with caches:"
          echo "$REFS" | while read -r ref; do echo "  - $ref"; done
          echo ""
          
          # Process each ref - delete old caches, keep latest
          for REF in $REFS; do
            echo "📁 Processing ref: $REF"
            
            # Get cache IDs (newest first)
            CACHE_IDS=$(gh api --paginate \
              "/repos/$REPO/actions/caches?ref=$REF&sort=last_accessed_at&direction=desc" \
              --jq '.actions_caches[].id' 2>/dev/null || echo "")
            
            if [ -z "$CACHE_IDS" ]; then
              echo "  ✅ No caches found for ref: $REF"
              continue
            fi
            
            TOTAL=$(echo "$CACHE_IDS" | wc -l | xargs)
            echo "  📊 Found $TOTAL caches for ref: $REF"
            
            # Keep the first (latest) cache, delete the rest
            LATEST=$(echo "$CACHE_IDS" | head -1)
            echo "  📌 Keeping latest cache ID: $LATEST"
            
            # Delete all caches except the latest
            DELETED_COUNT=$(echo "$CACHE_IDS" | tail -n +2 | wc -l | xargs)
            
            # if [ "$DELETED_COUNT" -gt 0 ]; then
            #   echo "  🗑️ Deleting $DELETED_COUNT old caches..."
            #   echo "$CACHE_IDS" | tail -n +2 | \
            #     xargs -r -P 8 -I{} gh api --method DELETE \
            #       "/repos/$REPO/actions/caches/{}"
            #   echo "  ✅ Deleted $DELETED_COUNT old caches"
            # else
            #   echo "  ℹ️ Only 1 cache found, keeping it"
            # fi

            if [ "$DELETED_COUNT" -gt 0 ]; then
              echo "  🗑️ Deleting $DELETED_COUNT old caches..."
              echo "$CACHE_IDS" | tail -n +2 | \
                xargs -r -P 8 -I{} bash -c 'gh api --method DELETE "/repos/$REPO/actions/caches/{}" || true'
              echo "  ✅ Deleted $DELETED_COUNT old caches"
            else
              echo "  ℹ️ Only 1 cache found, keeping it"
            fi
            
            echo "  ✅ Kept latest cache ($LATEST)"
            echo ""
          done
          
          echo "🎉 Cache cleanup completed!"
              
              TOTAL=$(echo "$CACHE_IDS" | wc -l | xargs)
              echo "  📊 Found $TOTAL caches for ref: $REF"
              
              # Keep the first (latest) cache, delete the rest
              LATEST=$(echo "$CACHE_IDS" | head -1)
              echo "  📌 Keeping latest cache ID: $LATEST"
              
              # Delete all caches except the latest
              DELETED_COUNT=$(echo "$CACHE_IDS" | tail -n +2 | wc -l | xargs)
              
              if [ "$DELETED_COUNT" -gt 0 ]; then
                echo "  🗑️ Deleting $DELETED_COUNT old caches..."
                echo "$CACHE_IDS" | tail -n +2 | \
                  xargs -r -P 8 -I{} gh api --method DELETE \
                    "/repos/$REPO/actions/caches/{}"
                echo "  ✅ Deleted $DELETED_COUNT old caches"
              else
                echo "  ℹ️ Only 1 cache found, keeping it"
              fi
              
              echo "  ✅ Kept latest cache ($LATEST)"
              echo ""
            done
            
            echo "🎉 Cache cleanup completed!"
