name: "Artifacts CleanUp on main"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-scan:
    name: Build and Scan
    runs-on: git-hub-actiondemo
    permissions:
      contents: read
      security-events: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}},enable={{is_default_branch}}
            type=raw,value=run-${{ github.run_number }},enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cleanup:
    name: Cleanup Old Images
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.event_name == 'push' ||
      github.event_name == 'pull_request'
    permissions:
      packages: write
    steps:
      - name: Install GitHub CLI
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y

      - name: Authenticate with GitHub CLI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Delete old package versions
        run: |
          echo "Fetching versions and deleting old ones..."
          gh api /users/ashishsamal145/packages/container/github-actions-demo/versions \
            --jq '.[] | select((.metadata.container.tags // []) as $t | (($t | all(test("^(sha-)?[a-f0-9]{7,40}$"))))) | .id' \
            | xargs -r -P 8 -I{} gh api --method DELETE "/users/ashishsamal145/packages/container/github-actions-demo/versions/{}" \
            || echo "No versions to delete or error occurred"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

   # ── 5. Clean up old GitHub Actions caches ──────────────────────────────────
    # ── 5. Clean up old GitHub Actions caches ──────────────────────────────────
 # ── 5. Clean up old GitHub Actions caches ──────────────────────────────────
  # PR runs: delete every cache tied to this ref outright, blobs included —
  # nothing on a PR ref is worth carrying forward once this run has what it
  # needs, and the ref disappears when the PR closes anyway.
  # Branch runs (main/dev/etc.): only prune superseded Buildx *index* entries
  # (index-buildkit-1-<scope>#<version> — version increments on every write,
  # so keep the highest #N per scope, delete the rest). buildkit-blob-1-* is
  # deliberately left alone: blobs are content-addressed and referenced BY
  # HASH from the current index manifest, not superseded by "newest" — there's
  # no reliable way to tell from this API which blobs the live index still
  # points to without fetching and parsing the manifest. Guessing wrong turns
  # a cache hit into a cache miss for that layer rather than breaking the
  # build, but it's needless waste. GitHub's own 7-day-unused eviction reaps
  # orphaned blobs safely once nothing references them.
  cleanup-artifacts:
    runs-on: ubuntu-latest
    needs: [cleanup]
    # if: |
    #   github.event_name == 'push' || github.event_name == 'pull_request'
    if: always()

    permissions:
      actions: write
      contents: read

    steps:
      - name: Delete old GitHub Actions caches
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          # REF: "${{ github.event_name == 'pull_request' && format('refs/heads/{0}', github.base_ref) || github.ref }}"
          REF: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.ref }}
        run: |
          
         
          
          echo "Keeping latest cache for: $REF"

          gh api --paginate "/repos/$REPO/actions/caches" |
          jq -r '
            .actions_caches
            | (
                map(select(.ref | startswith("refs/pull/")))
                +
                (
                  group_by(.ref)
                  | map(
                      select(.[0].ref | startswith("refs/heads/"))
                      | sort_by(.last_accessed_at)
                      | reverse
                      | .[1:]
                    )
                  | flatten
                )
              )
            | .[].id
          ' |
          xargs -r -I{} gh api --method DELETE "/repos/$REPO/actions/caches/{}"
