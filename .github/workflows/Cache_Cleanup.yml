  # ── 5. Clean up old GitHub Actions caches ──────────────────────────────────
  cleanup-artifacts:
    runs-on: ubuntu-latest
    needs: [cleanup]  # No dependencies - run independently
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request'
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete old caches (keep latest per ref)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set +e  # Don't exit on errors
          
          echo "🧹 Cleaning up caches"
          echo "📁 Repository: $REPO"
          echo "📌 Event: ${{ github.event_name }}"
          echo ""
          
          # Check if this is a pull request
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            PR_REF="refs/pull/$PR_NUMBER/merge"
            
            echo "🔴 PR DETECTED - Deleting ALL caches for PR #$PR_NUMBER"
            echo "   Merge ref: $PR_REF"
            echo ""
            
            # Fetch all cache IDs for this PR
            CACHE_IDS=$(gh api --paginate "/repos/$REPO/actions/caches?ref=$PR_REF" \
              --jq '.actions_caches[].id' 2>/dev/null)
            
            if [ -z "$CACHE_IDS" ]; then
              echo "✅ No caches found for this PR"
            else
              CACHE_COUNT=$(echo "$CACHE_IDS" | grep -c .)
              echo "   Found $CACHE_COUNT cache(s) to delete"
              echo ""
              
              # Delete each cache
              echo "$CACHE_IDS" | while read -r CACHE_ID; do
                if [ -n "$CACHE_ID" ]; then
                  echo "   Deleting cache ID: $CACHE_ID"
                  if gh api --method DELETE "/repos/$REPO/actions/caches/$CACHE_ID" >/dev/null 2>&1; then
                    echo "   ✅ Deleted successfully"
                  else
                    echo "   ⚠️  Failed or already deleted"
                  fi
                fi
              done
              echo ""
              echo "✅ PR cache cleanup completed"
            fi
          else
            # For branch pushes: Keep latest cache per ref, delete older ones
            echo "🟢 BRANCH PUSH - Keeping latest cache per branch"
            echo ""
            
            # Get all unique refs with caches
            REFS=$(gh api --paginate "/repos/$REPO/actions/caches" \
              --jq '.actions_caches[].ref' 2>/dev/null | sort -u)
            
            if [ -z "$REFS" ]; then
              echo "✅ No caches found"
            else
              echo "$REFS" | while read -r REF; do
                if [ -n "$REF" ]; then
                  echo "📁 Processing ref: $REF"
                  
                  # Get all cache IDs for this ref, sorted by last_accessed_at (newest first)
                  CACHES=$(gh api --paginate "/repos/$REPO/actions/caches?ref=$REF&sort=last_accessed_at&direction=desc" \
                    --jq '.actions_caches[] | "\(.id)|\(.last_accessed_at)"' 2>/dev/null)
                  
                  if [ -z "$CACHES" ]; then
                    echo "   No caches for this ref"
                  else
                    CACHE_LINE_NUM=0
                    echo "$CACHES" | while read -r CACHE_LINE; do
                      CACHE_LINE_NUM=$((CACHE_LINE_NUM + 1))
                      CACHE_ID=$(echo "$CACHE_LINE" | cut -d'|' -f1)
                      CACHE_DATE=$(echo "$CACHE_LINE" | cut -d'|' -f2)
                      
                      if [ "$CACHE_LINE_NUM" -eq 1 ]; then
                        echo "   ✨ Keeping latest cache: $CACHE_ID (accessed: $CACHE_DATE)"
                      else
                        echo "   🗑️  Deleting old cache: $CACHE_ID"
                        gh api --method DELETE "/repos/$REPO/actions/caches/$CACHE_ID" >/dev/null 2>&1 || true
                      fi
                    done
                  fi
                fi
              done
              echo ""
              echo "✅ Branch cache cleanup completed"
            fi
          fi
          
          echo ""
          echo "🎉 Cache cleanup finished!"
