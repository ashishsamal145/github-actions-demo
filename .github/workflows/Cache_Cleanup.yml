name: "Artifacts CleanUp on main"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-scan:
    name: Build and Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}},enable={{is_default_branch}}
            type=raw,value=run-${{ github.run_number }},enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cleanup:
    name: Cleanup Old Images
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.event_name == 'push' ||
      github.event_name == 'pull_request'
    permissions:
      packages: write
    steps:
      - name: Install GitHub CLI
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y

      - name: Authenticate with GitHub CLI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Delete old package versions
        run: |
          echo "Fetching versions and deleting old ones..."
          gh api /users/ashishsamal145/packages/container/github-actions-demo/versions \
            --jq '.[] | select((.metadata.container.tags // []) as $t | (($t | all(test("^(sha-)?[a-f0-9]{7,40}$"))))) | .id' \
            | xargs -r -P 8 -I{} gh api --method DELETE "/users/ashishsamal145/packages/container/github-actions-demo/versions/{}" \
            || echo "No versions to delete or error occurred"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ── 5. Clean up old GitHub Actions caches ──────────────────────────────────
  cleanup-artifacts:
    runs-on: ubuntu-latest
    needs: [cleanup]
    if: always()
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete old caches (keep latest per ref)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "🧹 Cleaning up caches"
          
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # PR: Delete ONLY PR merge ref caches (keep branch caches)
            PR_REF="refs/pull/${{ github.event.pull_request.number }}/merge"
            echo "🔴 PR #${{ github.event.pull_request.number }} - Deleting ALL caches for $PR_REF"
            gh api --paginate "/repos/$REPO/actions/caches?ref=$PR_REF" \
              --jq '.actions_caches[].id' | \
              xargs -r -P 8 -I{} gh api --method DELETE "/repos/$REPO/actions/caches/{}" || true
          else
            # Branch push: Keep latest per ref, delete older ones (including orphaned PR caches)
            echo "🟢 Branch push - Keeping latest per ref"
            gh api --paginate "/repos/$REPO/actions/caches" \
              --jq '.actions_caches[].ref' | sort -u | while read REF; do
              gh api --paginate "/repos/$REPO/actions/caches?ref=$REF&sort=last_accessed_at&direction=desc" \
                --jq '.actions_caches[].id' | tail -n +2 | \
                xargs -r -P 8 -I{} gh api --method DELETE "/repos/$REPO/actions/caches/{}" || true
            done
          fi
          
          echo "✅ Cache cleanup finished!"
