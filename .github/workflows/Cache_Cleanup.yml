name: "Artifacts CleanUp on main"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-scan:
    name: Build and Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}},enable={{is_default_branch}}
            type=raw,value=run-${{ github.run_number }},enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cleanup:
    name: Cleanup Old Images
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.event_name == 'push' ||
      github.event_name == 'pull_request'
    permissions:
      packages: write
    steps:
      - name: Install GitHub CLI
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y

      - name: Authenticate with GitHub CLI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Delete old package versions
        run: |
          echo "Fetching versions and deleting old ones..."
          gh api /users/ashishsamal145/packages/container/github-actions-demo/versions \
            --jq '.[] | select((.metadata.container.tags // []) as $t | (($t | all(test("^(sha-)?[a-f0-9]{7,40}$"))))) | .id' \
            | xargs -r -P 8 -I{} gh api --method DELETE "/users/ashishsamal145/packages/container/github-actions-demo/versions/{}" \
            || echo "No versions to delete or error occurred"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

   # ── 5. Clean up old GitHub Actions caches ──────────────────────────────────
    # ── 5. Clean up old GitHub Actions caches ──────────────────────────────────
  # ── 5. Clean up old GitHub Actions caches ──────────────────────────────────
  # PRs: delete every cache tied to this PR's ref outright — PR caches are
  # short-lived and not worth the quota once this run has what it needs.
  # main/dev pushes: keep the newest cache per key group (Buildx gha scope,
  # or whatever else gets added later) and delete older superseded ones.
  cleanup-artifacts:
    runs-on: ubuntu-latest
    needs: [cleanup]
    if: always()
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete PR caches (all) or superseded branch caches (keep newest per key group)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          # PR -> refs/pull/<n>/merge ; push -> the pushed branch
          REF: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.ref }}
        run: |
          echo "Cleaning caches for ref: $REF (event: $EVENT)"

          gh api --paginate \
            "/repos/$REPO/actions/caches?ref=$REF&sort=last_accessed_at&direction=desc" \
            --jq '.actions_caches' > caches.json

          if [ "$EVENT" = "pull_request" ]; then
            # PR ref: delete everything, no "keep newest" — nothing on a PR
            # ref is worth carrying forward once this run is done with it.
            jq -r '.[].id' caches.json > stale_ids.txt
          else
            # Branch ref (main/dev via push): group by normalized key
            # (trailing hash stripped) so distinct cache families never
            # compete with each other for "newest." Keep the most recently
            # accessed entry per group, delete the rest.
            jq -r '
              group_by(.key | sub("[-_][0-9a-fA-F]{8,64}$"; ""))
              | .[]
              | sort_by(.last_accessed_at) | reverse
              | .[1:][]
              | .id
            ' caches.json > stale_ids.txt
          fi

          echo "Deleting $(wc -l < stale_ids.txt) cache(s)."
          xargs -r -P 8 -I{} gh api --method DELETE \
            "/repos/$REPO/actions/caches/{}" < stale_ids.txt
