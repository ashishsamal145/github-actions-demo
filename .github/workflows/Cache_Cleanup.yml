name: "Artifacts CleanUp on main"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-scan:
    name: Build and Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}},enable={{is_default_branch}}
            type=raw,value=run-${{ github.run_number }},enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cleanup:
    name: Cleanup Old Images
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.event_name == 'push' ||
      github.event_name == 'pull_request'
    permissions:
      packages: write
    steps:
      - name: Install GitHub CLI
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y

      - name: Authenticate with GitHub CLI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Delete old package versions
        run: |
          echo "Fetching versions and deleting old ones..."
          gh api /users/ashishsamal145/packages/container/github-actions-demo/versions \
            --jq '.[] | select((.metadata.container.tags // []) as $t | (($t | all(test("^(sha-)?[a-f0-9]{7,40}$"))))) | .id' \
            | xargs -r -P 8 -I{} gh api --method DELETE "/users/ashishsamal145/packages/container/github-actions-demo/versions/{}" \
            || echo "No versions to delete or error occurred"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ── 5. Clean up old GitHub Actions caches ──────────────────────────────────
  cleanup-artifacts:
    runs-on: ubuntu-latest
    needs: [cleanup]
    if: always()
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete old caches (keep latest per ref)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set +e
          
          echo "🧹 Cleaning up caches"
          echo "📁 Repository: $REPO"
          echo "📌 Event: ${{ github.event_name }}"
          echo "📌 Ref: ${{ github.ref }}"
          echo ""
          
          # NEW: For branch pushes, we want to delete ALL PR caches too
          # Because PR caches are orphaned when PRs are closed/merged
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "🟢 BRANCH PUSH DETECTED - Cleaning up ALL caches"
            echo ""
            
            # Get ALL unique refs with caches
            REFS=$(gh api --paginate "/repos/$REPO/actions/caches" \
              --jq '.actions_caches[].ref' 2>/dev/null | sort -u)
            
            if [ -z "$REFS" ]; then
              echo "✅ No caches found"
            else
              echo "📁 Found refs with caches:"
              echo "$REFS" | while read -r ref; do echo "  - $ref"; done
              echo ""
              
              # Process each ref
              echo "$REFS" | while read -r REF; do
                if [ -n "$REF" ]; then
                  # Check if this is a PR ref
                  if [[ "$REF" =~ ^refs/pull/[0-9]+/merge$ ]]; then
                    echo "🔴 PR CACHE DETECTED - Deleting ALL caches for $REF"
                    
                    # Delete ALL caches for this PR (don't keep any)
                    CACHE_IDS=$(gh api --paginate "/repos/$REPO/actions/caches?ref=$REF" \
                      --jq '.actions_caches[].id' 2>/dev/null)
                    
                    if [ -n "$CACHE_IDS" ]; then
                      CACHE_COUNT=$(echo "$CACHE_IDS" | grep -c .)
                      echo "   Found $CACHE_COUNT cache(s) to delete"
                      echo "$CACHE_IDS" | while read -r CACHE_ID; do
                        if [ -n "$CACHE_ID" ]; then
                          echo "   🗑️  Deleting cache ID: $CACHE_ID"
                          gh api --method DELETE "/repos/$REPO/actions/caches/$CACHE_ID" >/dev/null 2>&1 || true
                        fi
                      done
                      echo "   ✅ PR cache cleanup completed"
                    else
                      echo "   ✅ No caches found for $REF"
                    fi
                    echo ""
                  else
                    # For branch refs: Keep latest, delete older
                    echo "📁 Processing branch ref: $REF"
                    
                    # Get all cache IDs for this ref, sorted by last_accessed_at (newest first)
                    CACHES=$(gh api --paginate "/repos/$REPO/actions/caches?ref=$REF&sort=last_accessed_at&direction=desc" \
                      --jq '.actions_caches[] | "\(.id)|\(.last_accessed_at)"' 2>/dev/null)
                    
                    if [ -z "$CACHES" ]; then
                      echo "   No caches for this ref"
                    else
                      CACHE_LINE_NUM=0
                      echo "$CACHES" | while read -r CACHE_LINE; do
                        CACHE_LINE_NUM=$((CACHE_LINE_NUM + 1))
                        CACHE_ID=$(echo "$CACHE_LINE" | cut -d'|' -f1)
                        CACHE_DATE=$(echo "$CACHE_LINE" | cut -d'|' -f2)
                        
                        if [ "$CACHE_LINE_NUM" -eq 1 ]; then
                          echo "   ✨ Keeping latest cache: $CACHE_ID (accessed: $CACHE_DATE)"
                        else
                          echo "   🗑️  Deleting old cache: $CACHE_ID"
                          gh api --method DELETE "/repos/$REPO/actions/caches/$CACHE_ID" >/dev/null 2>&1 || true
                        fi
                      done
                    fi
                    echo ""
                  fi
                fi
              done
              echo "✅ Cache cleanup completed"
            fi
            
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            # For PR events: Delete ALL PR caches
            echo "🔴 PR EVENT DETECTED - Deleting ALL caches for this PR"
            echo ""
            
            PR_NUMBER="${{ github.event.pull_request.number }}"
            PR_MERGE_REF="refs/pull/$PR_NUMBER/merge"
            PR_HEAD_REF="${{ github.event.pull_request.head.ref }}"
            
            echo "   PR #$PR_NUMBER"
            echo "   Merge ref: $PR_MERGE_REF"
            echo "   Head ref: refs/heads/$PR_HEAD_REF"
            echo ""
            
            # Delete caches for both merge and head refs
            for REF in "$PR_MERGE_REF" "refs/heads/$PR_HEAD_REF"; do
              echo "📁 Checking ref: $REF"
              
              CACHE_IDS=$(gh api --paginate "/repos/$REPO/actions/caches?ref=$REF" \
                --jq '.actions_caches[].id' 2>/dev/null)
              
              if [ -z "$CACHE_IDS" ]; then
                echo "   ✅ No caches found for $REF"
              else
                CACHE_COUNT=$(echo "$CACHE_IDS" | grep -c .)
                echo "   Found $CACHE_COUNT cache(s) to delete"
                echo "$CACHE_IDS" | while read -r CACHE_ID; do
                  if [ -n "$CACHE_ID" ]; then
                    echo "   🗑️  Deleting cache ID: $CACHE_ID"
                    gh api --method DELETE "/repos/$REPO/actions/caches/$CACHE_ID" >/dev/null 2>&1 || true
                  fi
                done
                echo "   ✅ Cleanup completed for $REF"
              fi
              echo ""
            done
            
            echo "✅ PR cache cleanup completed"
          fi
          
          echo ""
          echo "🎉 Cache cleanup finished!"
