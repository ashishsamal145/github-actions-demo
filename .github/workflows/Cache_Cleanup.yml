name: "Artifacts CleanUp on main"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-scan:
    name: Build and Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}},enable={{is_default_branch}}
            type=raw,value=run-${{ github.run_number }},enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cleanup:
    name: Cleanup Old Images
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.event_name == 'push' ||
      github.event_name == 'pull_request'
    permissions:
      packages: write
    steps:
      - name: Install GitHub CLI
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y

      - name: Authenticate with GitHub CLI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Delete old package versions
        run: |
          echo "Fetching versions and deleting old ones..."
          gh api /users/ashishsamal145/packages/container/github-actions-demo/versions \
            --jq '.[] | select((.metadata.container.tags // []) as $t | (($t | all(test("^(sha-)?[a-f0-9]{7,40}$"))))) | .id' \
            | xargs -r -P 8 -I{} gh api --method DELETE "/users/ashishsamal145/packages/container/github-actions-demo/versions/{}" \
            || echo "No versions to delete or error occurred"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

   # ── 5. Clean up old GitHub Actions caches ──────────────────────────────────
    # ── 5. Clean up old GitHub Actions caches ──────────────────────────────────
 # ── 5. Clean up old GitHub Actions caches ──────────────────────────────────
  # PR runs: delete every cache tied to this ref outright, blobs included —
  # nothing on a PR ref is worth carrying forward once this run has what it
  # needs, and the ref disappears when the PR closes anyway.
  # Branch runs (main/dev/etc.): only prune superseded Buildx *index* entries
  # (index-buildkit-1-<scope>#<version> — version increments on every write,
  # so keep the highest #N per scope, delete the rest). buildkit-blob-1-* is
  # deliberately left alone: blobs are content-addressed and referenced BY
  # HASH from the current index manifest, not superseded by "newest" — there's
  # no reliable way to tell from this API which blobs the live index still
  # points to without fetching and parsing the manifest. Guessing wrong turns
  # a cache hit into a cache miss for that layer rather than breaking the
  # build, but it's needless waste. GitHub's own 7-day-unused eviction reaps
  # orphaned blobs safely once nothing references them.
  cleanup-artifacts:
    runs-on: ubuntu-latest
    needs: [cleanup]
    if: always()
    permissions:
      actions: write
      contents: read
      pull-requests: read
    steps:
      - name: Delete PR-branch caches; prune superseded index generations elsewhere
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # 1. Branches with an open PR right now.
          gh api --paginate "/repos/$REPO/pulls?state=open&per_page=100" \
            --jq '.[].head.ref' \
            | sed 's#^#refs/heads/#' > pr_refs.txt
          echo "Open PR branches:"; cat pr_refs.txt || echo "(none)"

          # 2. Every cache in the repo, flattened into one array across pages.
          gh api --paginate "/repos/$REPO/actions/caches?per_page=100" \
            --jq '.actions_caches[]' | jq -s '.' > caches.json
          echo "Total caches found: $(jq 'length' caches.json)"

          # 3. Split into PR-branch caches vs. everything else.
          jq -R -s 'split("\n") | map(select(length > 0))' pr_refs.txt > pr_refs.json

          jq -c --slurpfile prrefs pr_refs.json \
            '[.[] | select(.ref as $r | $prrefs[0] | index($r))]' \
            caches.json > pr_caches.json
          jq -c --slurpfile prrefs pr_refs.json \
            '[.[] | select(.ref as $r | ($prrefs[0] | index($r)) | not)]' \
            caches.json > branch_caches.json

          echo "PR-branch caches to delete: $(jq 'length' pr_caches.json)"
          echo "Non-PR branch caches to inspect: $(jq 'length' branch_caches.json)"

          # 4. PR-branch caches: delete everything, no exceptions.
          jq -r '.[].id' pr_caches.json > stale_ids.txt

          # 5. Non-PR branches: keep the newest index generation per
          # (ref, scope), delete older generations. Blobs untouched.
          jq -r '
            map(select(.key | test("^index-buildkit-1-")))
            | group_by(.ref + "::" + (.key | sub("#[0-9]+$"; "")))
            | .[]
            | sort_by(.key | capture("#(?<v>[0-9]+)$").v | tonumber) | reverse
            | .[1:][]
            | .id
          ' branch_caches.json >> stale_ids.txt

          echo "Deleting $(wc -l < stale_ids.txt) cache(s) total."
          xargs -r -P 8 -I{} gh api --method DELETE \
            "/repos/$REPO/actions/caches/{}" < stale_ids.txt
