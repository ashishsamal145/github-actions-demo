name: "CleanUp Artifacts"

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened, closed]

jobs:
  build-and-scan:
    name: Build and Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}},enable={{is_default_branch}}
            type=raw,value=run-${{ github.run_number }},enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.69.3
          trivy -v

      - name: Run Trivy scanner on the pushed image (Table format)
        run: |
          trivy image --severity CRITICAL,HIGH ghcr.io/${{ github.repository }}:latest

      - name: Generate SARIF report
        run: |
          trivy image --format sarif --output trivy-results.sarif ghcr.io/${{ github.repository }}:latest
        continue-on-error: true

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-scan'

      - name: Upload scan report as a workflow artifact
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          name: trivy-scan-report
          path: trivy-results.sarif

  # Cleanup job - Deletes ALL caches except latest for each ref
  cleanup-artifacts:
    runs-on: ubuntu-latest
    needs: [build-and-scan]
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request'
    permissions:
      actions: write
      contents: read
    steps:
      - name: Get all refs with caches
        id: get_refs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "📊 Getting all refs with caches..."
          
          # Get all unique refs that have caches
          REFS=$(gh api --paginate "/repos/$REPO/actions/caches" \
            --jq '.actions_caches[].ref' | sort -u)
          
          if [ -z "$REFS" ]; then
            echo "✅ No caches found in repository"
            echo "refs=" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "📁 Found refs with caches:"
          echo "$REFS" | while read -r ref; do
            echo "  - $ref"
          done
          
          # Store refs for next step
          echo "refs<<EOF" >> $GITHUB_OUTPUT
          echo "$REFS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Delete all caches except latest for each ref
        if: steps.get_refs.outputs.refs != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "🧹 Starting cache cleanup for all refs (keeping latest only)"
          echo ""
          
          # Read refs from previous step
          REFS="${{ steps.get_refs.outputs.refs }}"
          
          if [ -z "$REFS" ]; then
            echo "✅ No refs to clean"
            exit 0
          fi
          
          TOTAL_DELETED=0
          TOTAL_KEPT=0
          
          for REF in $REFS; do
            echo "📁 Processing ref: $REF"
            
            # Get all cache IDs for this ref (newest first)
            CACHE_IDS=$(gh api --paginate \
              "/repos/$REPO/actions/caches?ref=$REF&sort=last_accessed_at&direction=desc" \
              --jq '.actions_caches[].id' 2>/dev/null || echo "")
            
            if [ -z "$CACHE_IDS" ]; then
              echo "  ✅ No caches found for ref: $REF"
              continue
            fi
            
            TOTAL=$(echo "$CACHE_IDS" | wc -l | xargs)
            echo "  📊 Found $TOTAL caches for ref: $REF"
            
            # Keep the first (latest) cache, delete the rest
            LATEST=$(echo "$CACHE_IDS" | head -1)
            echo "  📌 Keeping latest cache ID: $LATEST"
            
            # Delete all caches except the latest
            DELETED=0
            echo "$CACHE_IDS" | tail -n +2 | while read -r CACHE_ID; do
              if [ -n "$CACHE_ID" ]; then
                echo "    🗑️ Deleting cache ID: $CACHE_ID"
                if gh api --method DELETE "/repos/$REPO/actions/caches/$CACHE_ID" 2>/dev/null; then
                  echo "    ✅ Deleted"
                  DELETED=$((DELETED + 1))
                else
                  echo "    ⚠️ Failed to delete"
                fi
              fi
            done
            
            DELETED_COUNT=$(echo "$CACHE_IDS" | tail -n +2 | wc -l | xargs)
            echo "  ✅ Kept latest cache ($LATEST)"
            echo "  ✅ Deleted $DELETED_COUNT old caches for ref: $REF"
            echo ""
            
            TOTAL_DELETED=$((TOTAL_DELETED + DELETED_COUNT))
            TOTAL_KEPT=$((TOTAL_KEPT + 1))
          done
          
          echo "🎉 Cache cleanup completed!"
          echo "📊 Summary:"
          echo "  - Processed $TOTAL_KEPT refs"
          echo "  - Deleted $TOTAL_DELETED old caches"
          echo "  - Kept latest cache for each ref"
