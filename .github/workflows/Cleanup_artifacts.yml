name: "CleanUp Artifacts"

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened, closed]

jobs:
  build-and-scan:
    name: Build and Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}},enable={{is_default_branch}}
            type=raw,value=run-${{ github.run_number }},enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.69.3
          trivy -v

      - name: Run Trivy scanner on the pushed image (Table format)
        run: |
          trivy image --severity CRITICAL,HIGH ghcr.io/${{ github.repository }}:latest

      - name: Generate SARIF report
        run: |
          trivy image --format sarif --output trivy-results.sarif ghcr.io/${{ github.repository }}:latest
        continue-on-error: true

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-scan'

      - name: Upload scan report as a workflow artifact
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          name: trivy-scan-report
          path: trivy-results.sarif

  # Cleanup job - Keep ONLY the single most recent cache globally
  cleanup-artifacts:
    runs-on: ubuntu-latest
    needs: [build-and-scan]
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request'
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete ALL caches except the single most recent one
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "🧹 Starting global cache cleanup (keeping only the single most recent cache)"
          echo ""
          
          # Get ALL caches sorted by last_accessed_at (newest first)
          ALL_CACHES=$(gh api --paginate "/repos/$REPO/actions/caches" \
            --jq '.actions_caches | sort_by(.last_accessed_at) | reverse')
          
          TOTAL=$(echo "$ALL_CACHES" | jq -s 'length')
          
          if [ "$TOTAL" -eq 0 ]; then
            echo "✅ No caches found in repository"
            exit 0
          fi
          
          echo "📊 Found $TOTAL caches in repository"
          
          # Get the most recent cache (first one)
          LATEST_ID=$(echo "$ALL_CACHES" | jq -r '.[0].id')
          LATEST_KEY=$(echo "$ALL_CACHES" | jq -r '.[0].key')
          LATEST_REF=$(echo "$ALL_CACHES" | jq -r '.[0].ref')
          LATEST_SIZE=$(echo "$ALL_CACHES" | jq -r '.[0].size_in_bytes / 1024 / 1024 | floor')
          LATEST_ACCESSED=$(echo "$ALL_CACHES" | jq -r '.[0].last_accessed_at')
          
          echo "📌 Keeping ONLY the most recent cache:"
          echo "   ID: $LATEST_ID"
          echo "   Key: $LATEST_KEY"
          echo "   Ref: $LATEST_REF"
          echo "   Size: $LATEST_SIZE MB"
          echo "   Last Accessed: $LATEST_ACCESSED"
          echo ""
          
          # Delete ALL other caches (skip the first one)
          DELETED=0
          echo "$ALL_CACHES" | jq -r '.[1:][] | .id' | while read -r CACHE_ID; do
            if [ -n "$CACHE_ID" ]; then
              echo "🗑️ Deleting cache ID: $CACHE_ID"
              if gh api --method DELETE "/repos/$REPO/actions/caches/$CACHE_ID" 2>/dev/null; then
                echo "✅ Deleted"
                DELETED=$((DELETED + 1))
              else
                echo "⚠️ Failed to delete"
              fi
            fi
          done
          
          DELETED_COUNT=$((TOTAL - 1))
          echo ""
          echo "🎉 Cache cleanup completed!"
          echo "📊 Summary:"
          echo "  - Total caches found: $TOTAL"
          echo "  - Kept: 1 (most recent)"
          echo "  - Deleted: $DELETED_COUNT old caches"
