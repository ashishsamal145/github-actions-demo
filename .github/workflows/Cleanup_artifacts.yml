name: "CleanUp Artifacts"

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened, closed]

jobs:
  build-and-scan:
    name: Build and Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}},enable={{is_default_branch}}
            type=raw,value=run-${{ github.run_number }},enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: true

      

  cleanup:
    name: Cleanup Old Images
    runs-on: ubuntu-latest
    needs: build-and-scan  # Wait for build to complete
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'  # Only run on main/master
    permissions:
      packages: write  # Required to delete packages
    
    steps:
      - name: Install GitHub CLI
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y

      - name: Authenticate with GitHub CLI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Delete old package versions (keep versions with "purvankara" tag)
        run: |
          echo "Fetching versions and deleting old ones..."

          gh api /users/ashishsamal145/packages/container/github-actions-demo/versions \
            --jq '.[] | select((.metadata.container.tags // []) as $t | (($t | all(test("^(sha-)?[a-f0-9]{7,40}$"))))) | .id'    \
            | xargs -r -P 8 -I{} gh api --method DELETE "/users/ashishsamal145/packages/container/github-actions-demo/versions/{}" \
            || echo "No versions to delete or error occurred"

        # gh api /users/ashishsamal145/packages/container/github-actions-demo/versions \
         #  --jq 'map(select(.metadata.container.tags | map(select(. == "purvankara" or . == "books")) | length == 0)) | .[1:] | .[].id' \
         #   | xargs -r -P 8 -I{} gh api --method DELETE "/users/ashishsamal145/packages/container/github-actions-demo/versions/{}" \
         #  || echo "No versions to delete or error occurred"
            

  # Cleanup job - Keep ONLY the single most recent cache globally
  cleanup-artifacts:
    runs-on: ubuntu-latest
    needs: [build-and-scan,cleanup]
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request'
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete ALL caches except the single most recent one
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "🧹 Starting global cache cleanup (keeping only the single most recent cache)"
          echo ""
          
          # Get ALL caches sorted by last_accessed_at (newest first)
          ALL_CACHES=$(gh api --paginate "/repos/$REPO/actions/caches" \
            --jq '.actions_caches | sort_by(.last_accessed_at) | reverse')
          
          TOTAL=$(echo "$ALL_CACHES" | jq -s 'length')
          
          if [ "$TOTAL" -eq 0 ]; then
            echo "✅ No caches found in repository"
            exit 0
          fi
          
          echo "📊 Found $TOTAL caches in repository"
          
          # Get the most recent cache (first one)
          LATEST_ID=$(echo "$ALL_CACHES" | jq -r '.[0].id')
          LATEST_KEY=$(echo "$ALL_CACHES" | jq -r '.[0].key')
          LATEST_REF=$(echo "$ALL_CACHES" | jq -r '.[0].ref')
          LATEST_SIZE=$(echo "$ALL_CACHES" | jq -r '.[0].size_in_bytes / 1024 / 1024 | floor')
          LATEST_ACCESSED=$(echo "$ALL_CACHES" | jq -r '.[0].last_accessed_at')
          
          echo "📌 Keeping ONLY the most recent cache:"
          echo "   ID: $LATEST_ID"
          echo "   Key: $LATEST_KEY"
          echo "   Ref: $LATEST_REF"
          echo "   Size: $LATEST_SIZE MB"
          echo "   Last Accessed: $LATEST_ACCESSED"
          echo ""
          
          # Delete ALL other caches (skip the first one)
          DELETED=0
          echo "$ALL_CACHES" | jq -r '.[1:][] | .id' | while read -r CACHE_ID; do
            if [ -n "$CACHE_ID" ]; then
              echo "🗑️ Deleting cache ID: $CACHE_ID"
              if gh api --method DELETE "/repos/$REPO/actions/caches/$CACHE_ID" 2>/dev/null; then
                echo "✅ Deleted"
                DELETED=$((DELETED + 1))
              else
                echo "⚠️ Failed to delete"
              fi
            fi
          done
          
          DELETED_COUNT=$((TOTAL - 1))
          echo ""
          echo "🎉 Cache cleanup completed!"
          echo "📊 Summary:"
          echo "  - Total caches found: $TOTAL"
          echo "  - Kept: 1 (most recent)"
          echo "  - Deleted: $DELETED_COUNT old caches"
