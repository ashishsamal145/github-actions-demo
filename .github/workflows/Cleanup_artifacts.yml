name: "CleanUp Artifacts"

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened, closed]

jobs:
  build-and-scan:
    name: Build and Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}},enable={{is_default_branch}}
            type=raw,value=run-${{ github.run_number }},enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.69.3
          trivy -v

      - name: Run Trivy scanner on the pushed image (Table format)
        run: |
          trivy image --severity CRITICAL,HIGH ghcr.io/${{ github.repository }}:latest

      - name: Generate SARIF report
        run: |
          trivy image --format sarif --output trivy-results.sarif ghcr.io/${{ github.repository }}:latest
        continue-on-error: true

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-scan'

      - name: Upload scan report as a workflow artifact
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          name: trivy-scan-report
          path: trivy-results.sarif

  # Cleanup job - runs only when PR is closed
  cleanup-artifacts:
    runs-on: ubuntu-latest
    needs: [build-and-scan]
    # Run on ALL events (push, PR open, synchronize, reopened, closed)
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request'
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete caches except latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          REF: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.ref }}
        run: |
          echo "🧹 Cleaning caches for ref: $REF (keeping latest only)"
          
          # Get all cache IDs sorted by last accessed (newest first)
          CACHE_IDS=$(gh api --paginate \
            "/repos/$REPO/actions/caches?ref=$REF&sort=last_accessed_at&direction=desc" \
            --jq '.actions_caches[].id' 2>/dev/null || echo "")
          
          if [ -z "$CACHE_IDS" ]; then
            echo "✅ No caches found for ref: $REF"
            exit 0
          fi
          
          TOTAL=$(echo "$CACHE_IDS" | wc -l | xargs)
          echo "📊 Found $TOTAL caches for ref: $REF"
          
          LATEST=$(echo "$CACHE_IDS" | head -1)
          echo "📌 Keeping latest cache ID: $LATEST"
          
          echo "$CACHE_IDS" | tail -n +2 | while read -r CACHE_ID; do
            if [ -n "$CACHE_ID" ]; then
              echo "🗑️ Deleting cache ID: $CACHE_ID"
              gh api --method DELETE "/repos/$REPO/actions/caches/$CACHE_ID" 2>/dev/null || echo "⚠️ Failed to delete"
            fi
          done
          
          DELETED=$(echo "$CACHE_IDS" | tail -n +2 | wc -l | xargs)
          echo "✅ Kept latest cache ($LATEST)"
          echo "✅ Deleted $DELETED old caches for ref: $REF"
