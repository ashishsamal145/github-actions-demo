name: Deploy to AKS

on:
  push:
    branches:
      - main  # Runs automatically when code is pushed to the main branch

permissions:
  id-token: write # Required to securely request the Azure OIDC JWT token
  contents: read  # Required to clone your repository files into the runner

jobs:
  deploy-to-aks:
    runs-on: ubuntu-latest
    steps:

    # 1. Fetch your code (including your Kubernetes manifests)
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Authenticate securely with Azure using OIDC federated identity
    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    # 3. Download the secure Kubeconfig credentials for your specific AKS cluster
    - name: Set AKS Cluster Context
      uses: azure/aks-set-context@v4
      with:
        resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
        cluster-name: ${{ secrets.AZURE_AKS_CLUSTER }}

    # 4. Substitute environment variables (like image tags) and apply your manifests
    - name: Deploy Manifests to AKS
      uses: azure/k8s-deploy@v5
      with:
        action: deploy
        manifests: |
          .github/deployment.yaml
          .github/service.yaml
