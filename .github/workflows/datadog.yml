name: Testing Secret Variables

on:
  workflow_dispatch

env:
  ACTIONS_STEP_DEBUG: true

jobs:
  test_secret_variables:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: "Checking Secret Variable"
        id: secret_check
        run: |
          if [ -n "${{ secrets.MY_KEY }}" ]; then
            echo "Secret exists (value hidden)"
            echo "secret_status=exists" >> $GITHUB_OUTPUT
          else
            echo "Secret is missing"
            echo "secret_status=missing" >> $GITHUB_OUTPUT
            exit 1
          fi
      
      - name: Send Datadog metrics
        run: |
          curl -X POST "https://api.datadoghq.com/api/v1/series" \
            -H "Content-Type: application/json" \
            -H "DD-API-KEY: ${{ secrets.DATADOG_API_KEY }}" \
            -d '{
              "series": [{
                "metric": "github.actions.secret.check",
                "points": [{"timestamp": '$(date +%s)', "value": 1}],
                "tags": [
                  "workflow:${{ github.workflow }}",
                  "status:${{ steps.secret_check.outputs.secret_status }}",
                  "run_id:${{ github.run_id }}"
                ]
              }]
            }'
