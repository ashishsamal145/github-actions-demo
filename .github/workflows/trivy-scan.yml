name: "Docker Build and Trivy Scan"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-scan:
    name: Build and Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t local-image:latest .

      # Use the latest version of Trivy action
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'local-image:latest'
          format: 'table'
          output: 'trivy-results.txt'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      # Alternative: Use a specific commit hash for stability
      # uses: aquasecurity/trivy-action@d710430a6722f083d9b4f926dda3f57d1cf99cf1

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Upload scan report as a workflow artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-scan-report
          path: trivy-results.txt
