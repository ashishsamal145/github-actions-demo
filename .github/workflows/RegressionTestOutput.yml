name: Scheduled Regression Tests with output in html


permissions:
  checks: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  schedule:
    - cron: '40 10 * * *'
  workflow_dispatch:

jobs:
  run-pester:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Run Pester tests with detailed results
        shell: pwsh
        id: pester-tests
        run: |
          Install-Module -Name Pester -Force -SkipPublisherCheck -Scope CurrentUser
          
          New-Item -ItemType Directory -Path ./TestResults -Force
          
          # Run tests and capture detailed results
          $config = New-PesterConfiguration
          $config.Run.Path = './health.Tests.ps1'
          $config.Output.Verbosity = 'Detailed'
          $config.Output.WriteDebugMessages = $true
          $config.Output.WriteDebugMessagesFrom = 'Warning'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = 'NUnitXml'
          $config.TestResult.OutputPath = './TestResults/test-results.xml'
          
          # Run tests and get results
          $results = Invoke-Pester -Configuration $config -PassThru
          
          # Generate detailed summary
          $detailedSummary = @"
          ## Test Results Summary
          ---------------------
          Total Tests: $($results.TotalCount)
          Passed: $($results.PassedCount)
          Failed: $($results.FailedCount)
          Skipped: $($results.SkippedCount)
          Duration: $($results.Duration)
          
          ## Failed Tests
          "@
          
          # Add failed test details
          $failedTests = $results.Failed
          if ($failedTests.Count -gt 0) {
            $detailedSummary += "`n"
            foreach ($test in $failedTests) {
              $detailedSummary += @"
          Test: $($test.Block)-$($test.Name)
          Error: $($test.ErrorRecord.Exception.Message)
          --------------------
          "@
            }
          } else {
            $detailedSummary += "`nNo failed tests!"
          }
          
          $detailedSummary | Out-File -FilePath ./TestResults/detailed-summary.txt
          
          # Also create a markdown version for GitHub
          $markdownSummary = @"
          ### Test Results
          
          | Metric | Value |
          |--------|-------|
          | Total Tests | $($results.TotalCount) |
          | Passed | ✅ $($results.PassedCount) |
          | Failed | ❌ $($results.FailedCount) |
          | Skipped | ⏭️ $($results.SkippedCount) |
          | Duration | $($results.Duration) |
          
          #### Failed Tests Details
          "@
          
          if ($failedTests.Count -gt 0) {
            $markdownSummary += "`n"
            foreach ($test in $failedTests) {
              $markdownSummary += @"
          - **$($test.Block)** - `$($test.Name)`
            - Error: `$($test.ErrorRecord.Exception.Message)`
          "@
            }
          } else {
            $markdownSummary += "`n✅ All tests passed!"
          }
          
          $markdownSummary | Out-File -FilePath ./TestResults/summary.md
          
          # Set output
          if ($results.FailedCount -eq 0) {
            echo "tests_passed=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "tests_passed=false" >> $env:GITHUB_OUTPUT
          }
          
          Get-Date -Format "yyyy-MM-dd HH:mm:ss"
        continue-on-error: true

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_id }}
          path: |
            ./TestResults/
          retention-days: 30

      - name: Add test summary to workflow run
        if: always()
        shell: pwsh
        run: |
          if (Test-Path ./TestResults/summary.md) {
            Get-Content ./TestResults/summary.md >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Publish Test Report with details
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            ./TestResults/test-results.xml
          check_name: Pester Test Results
          comment_mode: create  # This creates a comment on the commit
          report_individual_runs: true  # Shows individual test results
          test_file_prefix: health.Tests.ps1
          hide_comments: false  # Shows all details
          
      - name: Fail workflow if tests failed
        if: steps.pester-tests.outputs.tests_passed == 'false'
        run: exit 1
