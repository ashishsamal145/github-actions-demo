name: Scheduled Regression Tests with output in html


permissions:
  checks: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  schedule:
    - cron: '40 10 * * *'
  workflow_dispatch:

jobs:
  run-pester:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Run Pester tests with detailed results
        shell: pwsh
        id: pester-tests
        run: |
          Install-Module -Name Pester -Force -SkipPublisherCheck -Scope CurrentUser
          
          New-Item -ItemType Directory -Path ./TestResults -Force
          
          # Run tests and generate NUnit XML
          $config = New-PesterConfiguration
          $config.Run.Path = './health.Tests.ps1'
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = 'NUnitXml'
          $config.TestResult.OutputPath = './TestResults/test-results.xml'
          
          Invoke-Pester -Configuration $config
          
          # Run again with PassThru for results
          $results = Invoke-Pester -Path './health.Tests.ps1' -PassThru
          
          # Generate detailed summary
          $markdownSummary = @"
          ## 📊 Test Results Summary
          
          | Metric | Value |
          |--------|-------|
          | Total Tests | $($results.TotalCount) |
          | Passed | ✅ $($results.PassedCount) |
          | Failed | ❌ $($results.FailedCount) |
          | Skipped | ⏭️ $($results.SkippedCount) |
          | Duration | $($results.Duration) |
          
          ---
          
          ## 📝 All Test Results
          "@
          
          # List ALL tests with their status
          $allTests = $results.Tests
          $markdownSummary += "`n| Test Name | Status |`n|-----------|--------|`n"
          
          foreach ($test in $allTests) {
            $status = if ($test.Result -eq 'Passed') { '✅ Passed' } else { '❌ Failed' }
            $testName = $test.Name
            $markdownSummary += "| $testName | $status |`n"
          }
          
          $markdownSummary += "`n---`n"
          
          # Add failed test details
          $failedTests = $results.Failed
          if ($failedTests.Count -gt 0) {
            $markdownSummary += "`n## ❌ Failed Tests Details`n`n"
            foreach ($test in $failedTests) {
              $markdownSummary += @"
          ### Test: $($test.Name)
          - **Block**: $($test.Block)
          - **Error**: `$($test.ErrorRecord.Exception.Message)`
          - **Line**: $($test.ScriptBlock.StartPosition.Line)
          
          ---
          
          "@
            }
          } else {
            $markdownSummary += "`n## ✅ All tests passed successfully!`n"
          }
          
          $markdownSummary | Out-File -FilePath ./TestResults/summary.md -Encoding UTF8
          
          # Create text summary
          $textSummary = "Test Results - $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')`n"
          $textSummary += "=" * 50 + "`n`n"
          
          foreach ($test in $allTests) {
            $status = if ($test.Result -eq 'Passed') { 'PASSED' } else { 'FAILED' }
            $textSummary += "$status - $($test.Name)`n"
            if ($test.Result -ne 'Passed') {
              $textSummary += "  Error: $($test.ErrorRecord.Exception.Message)`n"
            }
          }
          $textSummary | Out-File -FilePath ./TestResults/test-details.txt -Encoding UTF8
          
          # Set output
          if ($results.FailedCount -eq 0) {
            echo "tests_passed=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "tests_passed=false" >> $env:GITHUB_OUTPUT
          }
          echo "test_count=$($results.TotalCount)" >> $env:GITHUB_OUTPUT
          echo "failed_count=$($results.FailedCount)" >> $env:GITHUB_OUTPUT
          echo "passed_count=$($results.PassedCount)" >> $env:GITHUB_OUTPUT
          
          Get-Date -Format "yyyy-MM-dd HH:mm:ss"
        continue-on-error: true

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_id }}
          path: |
            ./TestResults/
          retention-days: 30

      - name: Add test summary to workflow run
        if: always()
        shell: pwsh
        run: |
          if (Test-Path ./TestResults/summary.md) {
            Get-Content ./TestResults/summary.md >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Display test results in console
        if: always()
        shell: pwsh
        run: |
          Write-Host "## 📊 Test Results" -ForegroundColor Cyan
          Write-Host "=" * 50 -ForegroundColor Cyan
          
          if (Test-Path ./TestResults/test-details.txt) {
            Get-Content ./TestResults/test-details.txt
          }
          
          Write-Host "=" * 50 -ForegroundColor Cyan
          Write-Host "Artifacts available in the 'test-results' folder" -ForegroundColor Yellow

      - name: Publish Test Report
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            ./TestResults/test-results.xml
          check_name: Pester Test Results
          comment_mode: always  # Valid options: off, always, changes, "changes in failures", "changes in errors", failures, errors
          report_individual_runs: true
          check_run_annotations: failure
          check_run_annotations_branch: dev

      - name: Fail workflow if tests failed
        if: steps.pester-tests.outputs.tests_passed == 'false'
        run: exit 1
